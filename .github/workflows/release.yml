name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - run: cargo build --release --workspace

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir dist
          cp target/release/rehash dist/
          cp target/release/rehash-daemon dist/
          cd dist && tar czf ../rehash-${{ github.ref_name }}-${{ matrix.target }}.tar.gz *

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force dist
          Copy-Item target/release/rehash.exe dist/
          Copy-Item target/release/rehash-daemon.exe dist/
          Compress-Archive -Path dist/* -DestinationPath rehash-${{ github.ref_name }}-${{ matrix.target }}.zip

      - uses: softprops/action-gh-release@v2
        with:
          files: rehash-*
