<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <circle cx="60" cy="60" r="58" fill="url(#bg)" stroke="#1e3a5f" stroke-width="1.5"/>

  <!-- Hash vertical bars (split to avoid overlap) -->
  <!-- Left vertical - top segment -->
  <rect x="38" y="30" width="5" height="16" rx="2.5" fill="#3b82f6"/>
  <!-- Left vertical - middle segment -->
  <rect x="38" y="50" width="5" height="20" rx="2.5" fill="#3b82f6"/>
  <!-- Left vertical - bottom segment -->
  <rect x="38" y="74" width="5" height="16" rx="2.5" fill="#3b82f6"/>

  <!-- Right vertical - top segment -->
  <rect x="58" y="30" width="5" height="16" rx="2.5" fill="#10b981"/>
  <!-- Right vertical - middle segment -->
  <rect x="58" y="50" width="5" height="20" rx="2.5" fill="#10b981"/>
  <!-- Right vertical - bottom segment -->
  <rect x="58" y="74" width="5" height="16" rx="2.5" fill="#10b981"/>

  <!-- Hash horizontal bars -->
  <!-- Top horizontal -->
  <rect x="32" y="42" width="38" height="5" rx="2.5" fill="#10b981"/>
  <!-- Bottom horizontal -->
  <rect x="32" y="73" width="38" height="5" rx="2.5" fill="#3b82f6"/>

  <!-- Refresh/reload arrow -->
  <path d="M85 30 A32 32 0 1 1 85 80" fill="none" stroke="#f59e0b" stroke-width="3.5" stroke-linecap="round"/>
  <polygon points="85,80 80,69 90,74" fill="#f59e0b"/>
</svg>
