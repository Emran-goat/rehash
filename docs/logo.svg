<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 140" width="500" height="140">
  <!-- Terminal window frame -->
  <rect x="10" y="10" width="340" height="120" rx="8" fill="#1e293b"/>
  <rect x="10" y="10" width="340" height="28" rx="8" fill="#0f172a"/>
  <rect x="10" y="30" width="340" height="8" fill="#0f172a"/>

  <!-- Window dots -->
  <circle cx="28" cy="24" r="5" fill="#ef4444"/>
  <circle cx="46" cy="24" r="5" fill="#f59e0b"/>
  <circle cx="64" cy="24" r="5" fill="#10b981"/>

  <!-- Terminal title -->
  <text x="180" y="29" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="11" fill="#64748b" text-anchor="middle">rehash</text>

  <!-- Terminal content - prompt line -->
  <text x="22" y="62" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="16" fill="#f1f5f9">
    <tspan fill="#10b981">$</tspan>
    <tspan fill="#93c5fd"> rehash</tspan>
    <tspan fill="#cbd5e1"> build</tspan>
    <tspan fill="#f59e0b"> cargo build</tspan>
  </text>

  <!-- Terminal content - output line 1 -->
  <text x="22" y="88" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="14" fill="#64748b">
    <tspan fill="#94a3b8">  cache hit</tspan>
    <tspan fill="#10b981">  done in 0.3s</tspan>
  </text>

  <!-- Terminal content - output line 2 with blinking cursor -->
  <text x="22" y="112" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="14" fill="#10b981">  restored 47 artifacts</text>
  <rect x="228" y="98" width="8" height="16" rx="1" fill="#10b981" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0;0.8" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Side text -->
  <text x="380" y="38" font-family="'SF Pro Display', -apple-system, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="#0f172a" letter-spacing="-1">rehash</text>
  <text x="380" y="60" font-family="'SF Mono', 'Cascadia Code', 'Fira Code', 'Courier New', monospace" font-size="10" fill="#94a3b8" font-weight="600" letter-spacing="3">BUILD CACHE</text>
  <line x1="380" y1="72" x2="480" y2="72" stroke="#e2e8f0" stroke-width="1"/>
</svg>
